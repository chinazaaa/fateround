<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#161320"/>
      <stop offset="100%" stop-color="#0d0b13"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f43f5e" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#f43f5e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f43f5e"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
    <linearGradient id="rosePill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  <circle cx="980" cy="80" r="420" fill="url(#glow)"/>

  <!-- logo -->
  <g transform="translate(64,56)">
    <rect width="56" height="56" rx="14" fill="url(#iconGrad)"/>
    <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.9">
      <path d="M28 15 L40.5 36 L15.5 36 Z"/>
    </g>
    <circle cx="28" cy="15" r="5.2" fill="#ffffff"/>
    <circle cx="40.5" cy="36" r="5.2" fill="#ffffff"/>
    <circle cx="15.5" cy="36" r="5.2" fill="#ffffff"/>
  </g>
  <text x="134" y="95" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="30" fill="#fdf2f4">Fate<tspan fill="#fb7185">Round</tspan></text>

  <!-- eyebrow -->
  <text x="64" y="190" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="16" letter-spacing="4" fill="#fb7185">ROUND-BASED VOTING GAMES</text>

  <!-- headline -->
  <text x="62" y="270" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="62" fill="#fdf2f4">Decide their fate.</text>

  <!-- subhead -->
  <text x="64" y="330" font-family="Liberation Sans, Arial, sans-serif" font-weight="400" font-size="23" fill="#a99fb0">Kiss, Marry, Kill &#183; Hire, Fire, Promote &#183;</text>
  <text x="64" y="364" font-family="Liberation Sans, Arial, sans-serif" font-weight="400" font-size="23" fill="#a99fb0">Gold, Silver, Bronze &#8212; or write your own.</text>

  <!-- url -->
  <text x="64" y="560" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="34" fill="#fb7185">fateround.com</text>

  <!-- template tag pills (behind main card) -->
  <g transform="rotate(3 760 552)" opacity="0.85">
    <rect x="615" y="524" width="290" height="48" rx="24" fill="#7c3aed"/>
    <text x="760" y="554" text-anchor="middle" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="16" fill="#fdf2f4" letter-spacing="1.5">GOLD &#183; SILVER &#183; BRONZE</text>
  </g>
  <g transform="rotate(-5 990 540)" opacity="0.85">
    <rect x="890" y="510" width="200" height="48" rx="24" fill="#0d9488"/>
    <text x="990" y="541" text-anchor="middle" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="17" fill="#fdf2f4" letter-spacing="2">BEST &#183; WORST</text>
  </g>

  <!-- main round card -->
  <g transform="rotate(-3 830 300)">
    <rect x="600" y="110" width="460" height="380" rx="24" fill="#1e1a2b" stroke="#332a40" stroke-width="2"/>

    <!-- header -->
    <text x="630" y="156" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="16" letter-spacing="3" fill="#8b8597">ROUND 2 OF 5</text>
    <circle cx="998" cy="150" r="11" fill="none" stroke="#8b8597" stroke-width="2.5"/>
    <path d="M998 142 L998 150 L1004 153" stroke="#8b8597" stroke-width="2.5" stroke-linecap="round" fill="none"/>
    <text x="1018" y="156" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="18" fill="#fdf2f4">0:18</text>

    <line x1="630" y1="178" x2="1030" y2="178" stroke="#332a40" stroke-width="2"/>

    <!-- row 1 -->
    <circle cx="660" cy="232" r="24" fill="url(#rosePill)"/>
    <text x="660" y="240" text-anchor="middle" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="20" fill="#fdf2f4">S</text>
    <text x="700" y="240" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="24" fill="#fdf2f4">Sarah</text>
    <rect x="940" y="212" width="90" height="40" rx="20" fill="#f43f5e"/>
    <text x="985" y="238" text-anchor="middle" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="17" fill="#fdf2f4" letter-spacing="2">KISS</text>

    <!-- row 2 -->
    <circle cx="660" cy="310" r="24" fill="#8b5cf6"/>
    <text x="660" y="318" text-anchor="middle" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="20" fill="#fdf2f4">M</text>
    <text x="700" y="318" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="24" fill="#fdf2f4">Michael</text>
    <rect x="930" y="290" width="100" height="40" rx="20" fill="#8b5cf6"/>
    <text x="980" y="316" text-anchor="middle" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="17" fill="#fdf2f4" letter-spacing="2">MARRY</text>

    <!-- row 3 -->
    <circle cx="660" cy="388" r="24" fill="#4b4458"/>
    <text x="660" y="396" text-anchor="middle" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="20" fill="#fdf2f4">J</text>
    <text x="700" y="396" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="24" fill="#fdf2f4">Jessica</text>
    <rect x="945" y="368" width="85" height="40" rx="20" fill="none" stroke="#fb7185" stroke-width="2.5"/>
    <text x="987" y="394" text-anchor="middle" font-family="Liberation Sans, Arial, sans-serif" font-weight="700" font-size="17" fill="#fb7185" letter-spacing="2">KILL</text>

    <!-- footer hint -->
    <text x="630" y="460" font-family="Liberation Sans, Arial, sans-serif" font-weight="400" font-size="16" fill="#6b6478">Assign one action to each person before time runs out</text>
  </g>
</svg>
