name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  migrations-check:
    name: Migrations Check
    runs-on: ubuntu-latest
    # Runs on every push and PR (no secrets needed) so a duplicate migration
    # version is caught before merge — never silently at deploy time. Two files
    # sharing a <version>_ prefix make `supabase db push` abort on the second
    # one's schema_migrations insert (duplicate pkey), skipping every migration
    # queued behind it.
    steps:
      - uses: actions/checkout@v4
      - name: Ensure migration versions are unique
        run: |
          dups="$(ls -1 supabase/migrations/*.sql 2>/dev/null \
            | xargs -n1 basename \
            | sed -E 's/^([0-9]+)_.*/\1/' \
            | sort | uniq -d)"
          if [ -n "$dups" ]; then
            echo "::error::Duplicate migration version(s): $dups"
            echo "Every file in supabase/migrations must have a unique <version>_ prefix."
            for v in $dups; do echo "  clashing files for $v:"; ls -1 supabase/migrations/${v}_*.sql; done
            exit 1
          fi
          echo "All migration versions are unique."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Test
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  build:
    name: Build
    needs: [lint, format, typecheck]
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-for-build-only
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  migrate:
    name: DB Migrate
    needs: [build, migrations-check]
    # Only on a push to dev or main — never an unmerged PR, and never another
    # branch (gating here, before `environment` attaches, keeps the Preview/
    # Production secrets off unrelated branch pushes).
    if: github.event_name == 'push' && (github.ref_name == 'dev' || github.ref_name == 'main')
    runs-on: ubuntu-latest
    # Select the matching GitHub Environment so secrets.SUPABASE_* resolve to the
    # right project's credentials: main -> Production, dev -> Preview.
    environment: ${{ github.ref_name == 'main' && 'Production' || 'Preview' }}
    # Read-only repo access — this job only reads migrations and pushes to the DB.
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: supabase/setup-cli@v1
        with:
          version: 2.108.0
      # Apply migrations to the environment's own Supabase project, using that
      # GitHub Environment's secrets (DB password differs per project).
      #   main -> Production project (skhvbzitwvnbhqxfitgh)
      #   dev  -> Preview project    (xzvsrzbbgxbaagqwtpts)
      # --include-all applies every migration missing from the remote history
      # table, regardless of version order (migrations land from separate PRs and
      # can arrive older-than-latest). Already-applied versions are skipped, so
      # re-runs are no-ops.
      - name: Apply migrations
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ] || [ -z "${SUPABASE_DB_PASSWORD:-}" ]; then
            echo "Supabase secrets not configured for this environment — skipping DB migrate."
            exit 0
          fi
          case "${GITHUB_REF_NAME}" in
            main) REF="skhvbzitwvnbhqxfitgh" ;;  # production
            dev)  REF="xzvsrzbbgxbaagqwtpts" ;;  # preview
            *)
              echo "No Supabase project wired for '${GITHUB_REF_NAME}' — skipping."
              exit 0
              ;;
          esac
          supabase link --project-ref "$REF"

          # Fail loudly on any push error. We deliberately do NOT swallow the
          # "duplicate schema_migrations_pkey" failure: the only thing that
          # produced it was two files sharing a version, which db push applies in
          # order until the second one's history insert collides — silently
          # skipping every migration behind it. Unique versions are enforced by
          # the migrations-check job, so a non-zero exit here is a genuine problem
          # a human must look at, not something to paper over.
          supabase db push --include-all

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --audit-level=high || true
      - name: Check for hardcoded secrets
        run: |
          if grep -rn 'SUPABASE_ANON_KEY\s*=' --include='*.ts' --include='*.tsx' src/ | grep -v 'process.env' | grep -v '.env'; then
            echo "Hardcoded secrets found in source code"
            exit 1
          fi
          echo "No hardcoded secrets found"
